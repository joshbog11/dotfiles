# Sora tmux theme
# Source this from ~/.tmux.conf with: source-file ~/sora.tmux.conf

set -g status-style "bg=#0e1018,fg=#c8d0e0"
set -g status-left-length 40
set -g status-right-length 80

# Left: session name
set -g status-left "#[bg=#80c8e0,fg=#0e1018,bold] #S #[bg=#0e1018,fg=#80c8e0]"

# Right: host + time
set -g status-right "#[fg=#586478]#[bg=#586478,fg=#c8d0e0] %H:%M #[bg=#80c8e0,fg=#0e1018,bold] #h "

# Window tabs
set -g window-status-format "#[fg=#586478] #I:#W "
set -g window-status-current-format "#[bg=#1e2430,fg=#80c8e0,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#1e2430"
set -g pane-active-border-style "fg=#80c8e0"

# Message / command line
set -g message-style "bg=#1e2430,fg=#80c8e0"
set -g message-command-style "bg=#1e2430,fg=#d4b878"

# Mode (copy mode etc.)
set -g mode-style "bg=#283448,fg=#dce4f0"
